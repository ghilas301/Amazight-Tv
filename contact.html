  <style>
    /* Styles additionnels pour le logo dans le header */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo-image {
      height: 40px;
      width: auto;
      border-radius: 6px;
    }
    .logo-text {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.5em;
      color: var(--color-primary);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Ajustement responsive pour le header avec logo */
    @media (max-width: 768px) {
      .logo-container {
        gap: 8px;
      }
      .logo-image {
        height: 32px;
      }
      .logo-text {
        font-size: 1.8em;
        letter-spacing: 2px;
      }
    }

    @media (max-width: 480px) {
      .logo-image {
        height: 28px;
      }
      .logo-text {
        font-size: 1.6em;
      }
    }

<body>

<header class="header" role="banner">
  <a href="index.html" class="logo-container" aria-label="Amazigh TV - Retour à l'accueil">
    <img src="./images/logo-180.png" alt="Logo Amazigh TV" class="logo-image">
    <span class="logo-text">Amazigh TV</span>
  </a>
  <nav class="navigation" role="navigation" aria-label="Menu principal">
    <a href="index.html" aria-label="Aller à l'accueil"><i class="fas fa-home" aria-hidden="true"></i> <span>Accueil</span></a>

  </nav>
</header>

<main class="main-content" role="main">
  <section class="film-list-section" style="padding-top: 100px; text-align: center;">
    <h2>Contactez-Nous</h2>
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
      <p style="font-size: 1.2em; margin-bottom: 30px;">
        Vous avez une question, une suggestion ou vous souhaitez nous proposer un film ?
        N'hésitez pas à nous contacter !
      </p>
      
      <div style="background: var(--color-card-bg); padding: 30px; border-radius: 10px;">
        <h3 style="color: var(--color-primary); margin-bottom: 20px;">
          <i class="fas fa-envelope"></i> Email de contact
        </h3>
        <p style="font-size: 1.3em;">
          <a href="mailto:contact@amazightv.com" style="color: var(--color-primary); text-decoration: none;">
            contact@amazightv.com
          </a>
        </p>
      </div>

      <div style="margin-top: 40px;">
        <h3>Suivez-nous</h3>
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
          <a href="#" style="color: var(--color-text); font-size: 2em;" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
          <a href="#" style="color: var(--color-text); font-size: 2em;" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
          <a href="#" style="color: var(--color-text); font-size: 2em;" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer" role="contentinfo">
